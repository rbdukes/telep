name: Safe Sync with Upstream (Preserve Custom Settings)

on:
  schedule:
    # Runs daily at 3:00 AM UTC
    - cron: '0 3 * * *'
  # Allows you to run manually from Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Add upstream repository (original author)
        run: |
          git remote add upstream https://github.com/kort0881/telegram-proxy-collector.git
          git fetch upstream
      
      - name: Keep YOUR workflow file safe
        run: |
          # Backup your custom workflow file before merging
          if [ -f .github/workflows/main.yml ]; then
            cp .github/workflows/main.yml .github/workflows/main.yml.backup
            echo "✅ Your workflow file backed up"
          fi
      
      - name: Merge upstream changes (excluding your workflow)
        run: |
          git checkout main
          # Merge upstream/main but keep your workflow file
          git merge --no-commit --no-ff upstream/main || true
          
          # RESTORE YOUR WORKFLOW FILE (prevents overwrite)
          if [ -f .github/workflows/main.yml.backup ]; then
            cp .github/workflows/main.yml.backup .github/workflows/main.yml
            echo "✅ Your workflow file restored"
            rm .github/workflows/main.yml.backup
          fi
          
          # If there are conflicts in other files, they need manual resolution
          # This creates a PR instead of auto-merging conflicted files
          git diff --cached --quiet || echo "CHANGES_PENDING"
      
      - name: Create Pull Request if changes exist
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Sync with upstream (kort0881/telegram-proxy-collector)"
          title: "📥 Upstream Sync: New updates available"
          body: |
            ## Upstream Updates Available
            
            This PR merges changes from the original repository (`kort0881/telegram-proxy-collector`).
            
            ### ✅ What will be preserved:
            - Your custom cron schedule (every hour)
            - Your custom `config.yml` (including FreeFolksOn source)
            - Your enhanced HTML file
            
            ### ⚠️ Please review before merging:
            - Check if `main.py` has updates (you likely want these)
            - Check if `config.yml` has new sources (add them, don't replace)
            
            Merge this PR to get the latest improvements while keeping your custom settings.
          branch: upstream-sync
          base: main
          labels: |
            upstream-sync
            automated
